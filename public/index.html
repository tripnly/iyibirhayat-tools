<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iyibirhayat Araçlar</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f8f7f4;color:#1a1a1a;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.container{text-align:center;max-width:600px}
h1{font-size:28px;margin-bottom:8px}
h1 span{color:#1D9E75}
p{color:#6b6b6b;font-size:15px;margin-bottom:32px}
.tools{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}
.tool-link{display:block;padding:24px 16px;background:white;border-radius:16px;border:1px solid #e8e6e1;text-decoration:none;color:#1a1a1a;transition:all .2s}
.tool-link:hover{border-color:#1D9E75;box-shadow:0 4px 12px rgba(29,158,117,0.1)}
.tool-link .icon{font-size:32px;margin-bottom:8px}
.tool-link .name{font-size:15px;font-weight:600}
</style>
</head>
<body>
<div class="container">
  <h1>\u{1F33F} iyibirhayat <span>araçlar</span></h1>
  <p>Bilimsel temelli interaktif araçlar</p>
  <div class="tools">
    <a href="/bmi" class="tool-link"><div class="icon">\u{1F9ED}</div><div class="name">BMI Hesaplayıcı</div></a>
    <a href="#" class="tool-link" style="opacity:0.5;pointer-events:none"><div class="icon">\u{1F324}</div><div class="name">Stres Testi</div></a>
    <a href="#" class="tool-link" style="opacity:0.5;pointer-events:none"><div class="icon">\u{1F319}</div><div class="name">Uyku Hesaplayıcı</div></a>
    <a href="#" class="tool-link" style="opacity:0.5;pointer-events:none"><div class="icon">\u{1F331}</div><div class="name">Pomodoro Timer</div></a>
  </div>
</div>
</body>
</html>
